name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: python -m pip install --upgrade pip

      - name: Install backend package
        run: pip install -e ".[dev,web]"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Ruff
        run: ruff check vulnclaw tests

      # Advisory type check: ~125 pre-existing findings, so non-blocking for now
      # (continue-on-error). Runs once on the baseline combo, not the whole matrix.
      - name: Mypy (advisory)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        run: mypy vulnclaw

      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b

      # Coverage gate (blocking) - enforced only on the baseline platform where the
      # 72% baseline was measured, to avoid cross-platform coverage drift breaking CI.
      - name: Pytest with coverage gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pytest -q --cov=vulnclaw --cov-report=term-missing

      - name: Pytest
        if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12') }}
        run: pytest -q

      # Security scans (advisory) - VulnClaw's own source and its dependency tree.
      # bandit uses the tuned skip list in pyproject; pip-audit flags dep CVEs.
      - name: Bandit security scan (advisory)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        run: bandit -c pyproject.toml -r vulnclaw -q

      - name: pip-audit dependency scan (advisory)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        run: pip-audit --desc
